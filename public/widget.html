<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT Pets Chat</title>
    <style>
        /* Reset and base styles */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --user-bubble: #2563eb;
            --agent-bubble: #f3f4f6;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
            background: transparent;
        }

        /* Chat widget container - floating button and window */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            font-family: inherit;
        }

        /* Floating toggle button */
        .chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s, background 0.2s;
        }

        .chat-toggle:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .chat-toggle .close-icon {
            display: none;
        }

        .chat-widget.open .chat-toggle .chat-icon {
            display: none;
        }

        .chat-widget.open .chat-toggle .close-icon {
            display: block;
        }

        /* Chat window */
        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 380px;
            max-width: calc(100vw - 40px);
            height: 520px;
            max-height: calc(100vh - 120px);
            background: var(--bg-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-widget.open .chat-window {
            display: flex;
        }

        /* Header */
        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-header-info p {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--agent-bubble);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .message.user .message-time {
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--agent-bubble);
            padding: 12px 16px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator.visible {
            display: flex;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* Input area */
        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            background: var(--bg-color);
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            min-height: 40px;
            max-height: 100px;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .chat-send:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .chat-send:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .chat-send svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }

        .welcome-message h4 {
            color: var(--text-color);
            margin-bottom: 8px;
        }

        /* Error message */
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin: 8px 16px;
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .chat-widget {
                bottom: 10px;
                right: 10px;
            }

            .chat-window {
                width: calc(100vw - 20px);
                height: calc(100vh - 100px);
                bottom: 70px;
                right: -10px;
                border-radius: 12px;
            }

            .chat-toggle {
                width: 56px;
                height: 56px;
            }
        }

        /* Powered by footer */
        .powered-by {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
        }

        .powered-by a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="chat-widget" id="chatWidget">
        <!-- Toggle Button -->
        <button class="chat-toggle" id="chatToggle" aria-label="Toggle chat">
            <svg class="chat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
            <svg class="close-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </button>

        <!-- Chat Window -->
        <div class="chat-window" id="chatWindow">
            <!-- Header -->
            <div class="chat-header">
                <div class="chat-header-avatar">🐾</div>
                <div class="chat-header-info">
                    <h3>JT Pets</h3>
                    <p>Pet nutrition experts</p>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <h4>Welcome to JT Pets!</h4>
                    <p>Ask us anything about pet nutrition, our products, or get personalized recommendations for your furry friend.</p>
                </div>
            </div>

            <!-- Typing indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Input -->
            <div class="chat-input-area">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="Type your message..."
                    rows="1"
                    aria-label="Chat message"
                ></textarea>
                <button class="chat-send" id="chatSend" aria-label="Send message">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>

            <!-- Footer -->
            <div class="powered-by">
                Powered by <a href="https://jtpets.ca" target="_blank" rel="noopener">JT Pets AI</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // Configuration - can be overridden by embedding page
            const CONFIG = {
                apiUrl: window.JTPETS_CHAT_API_URL || '/api/chat',
                sessionKey: 'jtpets_chat_session',
            };

            // DOM elements
            const widget = document.getElementById('chatWidget');
            const toggle = document.getElementById('chatToggle');
            const messages = document.getElementById('chatMessages');
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('chatSend');
            const typingIndicator = document.getElementById('typingIndicator');

            // State
            let sessionId = localStorage.getItem(CONFIG.sessionKey) || null;
            let isLoading = false;

            // Toggle chat window
            toggle.addEventListener('click', () => {
                widget.classList.toggle('open');
                if (widget.classList.contains('open')) {
                    input.focus();
                }
            });

            // Auto-resize textarea
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 100) + 'px';
            });

            // Send on Enter (Shift+Enter for newline)
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Send button click
            sendBtn.addEventListener('click', sendMessage);

            // Add message to chat
            function addMessage(content, role) {
                // Remove welcome message if present
                const welcome = messages.querySelector('.welcome-message');
                if (welcome) {
                    welcome.remove();
                }

                // Remove any error messages
                const errors = messages.querySelectorAll('.error-message');
                errors.forEach(e => e.remove());

                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;

                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                msgDiv.innerHTML = `
                    <div class="message-content">${escapeHtml(content)}</div>
                    <div class="message-time">${time}</div>
                `;

                messages.appendChild(msgDiv);
                scrollToBottom();
            }

            // Show error message
            function showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                messages.appendChild(errorDiv);
                scrollToBottom();
            }

            // Scroll to bottom of messages
            function scrollToBottom() {
                messages.scrollTop = messages.scrollHeight;
            }

            // Escape HTML to prevent XSS
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Show/hide typing indicator
            function setTyping(show) {
                typingIndicator.classList.toggle('visible', show);
                if (show) {
                    scrollToBottom();
                }
            }

            // Set loading state
            function setLoading(loading) {
                isLoading = loading;
                sendBtn.disabled = loading;
                input.disabled = loading;
                setTyping(loading);
            }

            // Send message to API
            async function sendMessage() {
                const content = input.value.trim();
                if (!content || isLoading) return;

                // Clear input
                input.value = '';
                input.style.height = 'auto';

                // Add user message
                addMessage(content, 'user');

                // Set loading state
                setLoading(true);

                try {
                    const response = await fetch(CONFIG.apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: content,
                            sessionId: sessionId,
                        }),
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Something went wrong');
                    }

                    // Save session ID
                    if (data.sessionId) {
                        sessionId = data.sessionId;
                        localStorage.setItem(CONFIG.sessionKey, sessionId);
                    }

                    // Add agent response
                    addMessage(data.response, 'agent');

                } catch (error) {
                    console.error('Chat error:', error);
                    showError(error.message || 'Failed to send message. Please try again.');
                } finally {
                    setLoading(false);
                    input.focus();
                }
            }

            // Initialize - check for stored session
            if (sessionId) {
                console.log('Resuming chat session:', sessionId.substring(0, 8));
            }
        })();
    </script>
</body>
</html>
